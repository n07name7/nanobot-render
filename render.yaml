services:
  - type: web
    name: nanobot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_USER_ID
        sync: false
      - key: NANOBOT_MODEL
        value: deepseek/deepseek-chat:free
